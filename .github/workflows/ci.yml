name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      - name: ShellCheck
        run: |
          mapfile -t shell_files < <(find scripts config/profiles config/agents tests -type f -name '*.sh' -print | sort)
          shellcheck -x -S warning bin/yard completions/yard.bash "${shell_files[@]}"
      - name: Host-free regression suite
        run: ./tests/run.sh
