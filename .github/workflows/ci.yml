name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Install system test tools
        run: sudo apt-get update -qq && sudo apt-get install -y gcc jq shellcheck
      - name: ShellCheck
        run: |
          mapfile -t shell_files < <(find scripts config/profiles config/agents tests -type f -name '*.sh' -print | sort)
          shellcheck -x -S warning bin/yard completions/yard.bash "${shell_files[@]}"
      - name: Yard-safe verification gate
        run: ./tests/run.sh
