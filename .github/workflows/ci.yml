name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      - name: ShellCheck
        run: >-
          shellcheck -x -S warning
          bin/yard
          scripts/*.sh
          config/profiles/*/*.sh
          config/agents/*/*.sh
          tests/helpers/*.sh
          tests/*.sh
          completions/yard.bash
      - name: Host-free regression suite
        run: ./tests/run.sh
