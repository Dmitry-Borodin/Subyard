# Profile: android — example dependency profile for Subyard.
#
# A profile is the only place that knows about a toolchain. The generic core
# reads these values to specialize an agent machine; it knows nothing about
# what they mean. Copy this file to create a new profile (e.g. node.conf).
#
# This .conf file is the non-secret contract: it is committed and may be logged.
# Secrets never go here — a profile that needs keys carries a sibling <name>.env
# (gitignored, values host-only), mounted into the agent as a file, never via -e.

PROFILE_NAME=android

# Base image for this profile's agent machines (overrides the core default).
# Independent of the yard's own OS.
BASE_IMAGE=ubuntu:24.04

# Shared, writable dependency caches (created under the yard's /srv).
# Agents fill these themselves; there is no read-only seeder.
CACHES="/srv/cache/android-sdk /srv/cache/gradle"

# Environment exported into the agent machines.
ANDROID_SDK_ROOT=/srv/cache/android-sdk
GRADLE_USER_HOME=/srv/cache/gradle

# Devices this profile requires from the core (space-separated keys).
# kvm => /dev/kvm passthrough for the hardware-accelerated emulator.
DEVICES="kvm"

# Toolchain versions (example pins; adjust per project).
ANDROID_API=36
JDK_VERSION=17
