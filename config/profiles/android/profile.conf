# Profile: android — example dependency profile for Subyard.
#
# A profile is the only place that knows about a toolchain. The generic core
# reads these values to specialize an agent container; it knows nothing about
# what they mean. Copy this folder to create a new profile (e.g. node/).
#
# This profile.conf is the non-secret contract: it is committed and may be logged.
# Secrets never go here — a profile that needs keys carries a sibling profile.env
# in this folder (gitignored, values host-only), mounted into the agent as a file,
# never via -e.

PROFILE_NAME=android

# Base image for this profile's agent containers (overrides the core default).
# Independent of the yard's own OS.
BASE_IMAGE=ubuntu:24.04

# Shared, writable dependency caches (created under the yard's /srv).
# Agents fill these themselves; there is no read-only seeder.
CACHES="/srv/cache/android-sdk /srv/cache/gradle"

# Environment exported into the agent containers.
ANDROID_SDK_ROOT=/srv/cache/android-sdk
GRADLE_USER_HOME=/srv/cache/gradle

# Devices for the AGENT container (L2). kvm => /dev/kvm for the emulator.
DEVICES="kvm"

# Yard-level (L1) needs — the emulator runs in the yard (P1). This profile REQUIRES a host iGPU:
# without GPU passthrough the emulator falls back to software GL (CPU-heavy, fails GPU-backed UI tests).
YARD_DEVICES="gpu"

# Emulator launch (config/profiles/android/emulator-run.sh): hardware GLES on the passed-through GPU,
# headless. -gpu host needs an X display whose GL is HW; the render node only does HW GL via EGL, so the
# launcher runs the emulator under a headless wlroots compositor (cage) + Xwayland on the render node.
# cage provides headlessness, so -no-window is unnecessary.
EMULATOR_GPU=host
EMULATOR_FLAGS="-no-audio -no-snapshot -no-boot-anim"
# AVD device profile (avdmanager --device). A real phone — the avdmanager default is a tiny 320x640/160dpi
# screen that breaks geometry-sensitive UI tests (e.g. pinch-zoom).
EMULATOR_DEVICE=pixel

# Toolchain versions (example pins; adjust per project).
ANDROID_API=36
JDK_VERSION=17
