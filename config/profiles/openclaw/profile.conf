# Profile: openclaw — dependency profile for the OpenClaw codebase (Node + Python).
#
# A profile is the only place that knows about a toolchain. The generic core
# reads these values to specialize an agent container; it knows nothing about
# what they mean. Copy the android/ profile folder to create a new profile.
#
# This profile.conf is the non-secret contract: it is committed and may be logged.
# Secrets never go here — a profile that needs keys carries a sibling profile.env
# in this folder (gitignored, values host-only), mounted into the agent as a file,
# never via -e.
#
# This profile carries what an agent needs to BUILD the codebase and RUN its
# tests, up to the full e2e matrix. The heavy parts (a headless browser, nested
# rootless Docker) are OPTIONAL and off by default — see OPTIONAL_FEATURES — so a
# plain dev container stays lean while the full surface stays available on demand.
#
# Out of scope: running the gateway live (provider keys, a chat bot, end-to-end
# approvals). That is a separate opt-in stack — no credentials belong here.

PROFILE_NAME=openclaw

# Base image for this profile's agent containers (overrides the core default).
# When IMAGE_DOCKERFILE is set below, this is the build base the toolchain image
# is FROM; otherwise the agent container runs this image directly.
BASE_IMAGE=ubuntu:24.04

# Dev-environment image: a path, RELATIVE TO THE WORKSPACE (the in-yard project
# repo), to the Dockerfile that builds this project's toolchain image. `yard agent up`
# builds it in the yard's Docker (--rebuild forces) and runs the agent from it. The
# Dockerfile is the project's own (single source of truth, pinned with the repo) —
# Subyard only builds it; it is not copied here. IMAGE_CONTEXT defaults to the
# Dockerfile's directory; IMAGE_TAG defaults to subyard-env-<project-id>.
#   IMAGE_DOCKERFILE=docker/<your-devcontainer>.Dockerfile
# Left empty here on purpose: the concrete path/name is project-specific, so set it
# per project (here locally or in your private overlay), not in this public profile.
# Empty => run BASE_IMAGE directly.
IMAGE_DOCKERFILE=""
# IMAGE_CONTEXT=""
# IMAGE_TAG=""

# Shared, writable dependency caches (created under the yard's /srv).
# Agents fill these themselves; there is no read-only seeder.
CACHES="/srv/cache/pnpm /srv/cache/pip /srv/cache/npm"

# Environment exported into the agent containers — point the package managers at
# the shared caches above (pnpm honors the npm_config_* keys).
#
# Sharing rules for these writable caches across several agent containers:
#   - agent containers must use a consistent (NOT isolated) idmap, or the shared
#     cache hits EACCES/EPERM from mismatched host UID/GID ownership;
#   - cache-mutating steps (pnpm store prune, npm cache clean, pip cache purge)
#     run single-writer under a lock, never in parallel with builds;
#   - pnpm hardlinks the store into node_modules only when both sit on the same
#     filesystem. If /srv/cache is a separate disk-device from the workspace,
#     pnpm falls back to copying (slower, more space) but still works.
PIP_CACHE_DIR=/srv/cache/pip
npm_config_cache=/srv/cache/npm
npm_config_store_dir=/srv/cache/pnpm
# (OpenClaw's huge native/ML binaries need a long pnpm fetch-timeout on the yard's slow egress; pnpm
# honors it only as a CLI flag — not .npmrc/env — so provision.sh's pnpm shim injects it for installs.)

# Devices passed into THIS project's agent container (space-separated keys).
# None by default: no KVM. (Yard-level capabilities like container nesting are
# requested via YARD_CAPS below, not here.)
DEVICES=""

# --- Two destinations a project config can target -----------------------------
# (1) What this project wants ON THE YARD (level 1, shared with other projects).
#     `yard init` applies the UNION of these across all in-yard projects; changes
#     are confirmed, and a cap change asks you to restart the yard. Empty by default.
#   YARD_MOUNTS — extra host mounts onto the yard, "<name>:<yard-path>:<ro|rw>:<mode>"
#   YARD_CAPS   — instance capabilities: nesting | rootless-docker | fuse
#                 (rootless-docker / nesting enable nested rootless Docker for
#                  sandbox_tests: security.nesting + idmap + syscall intercepts + /dev/fuse)
#   YARD_DEVICES— /dev passthrough on the yard: kvm | fuse
YARD_MOUNTS=""
YARD_CAPS=""
YARD_DEVICES=""

# (2) Mounts ONLY in this project's agent container (level 3), never on the yard.
#     docker -v syntax per entry: "<yard-src>:<container-dst>[:ro]".
AGENT_MOUNTS=""

# Optional capabilities — available, not hardcoded. Off by default; list the
# features a container needs (space-separated). Each pulls heavier dependencies
# and/or wants a more capable yard. A plain build plus unit/integration tests
# needs none of them; the full e2e run wants both:
#
#   OPTIONAL_FEATURES="browser_tests sandbox_tests"
#
#   browser_tests  Headless browser for the browser/voice extensions and the
#                  full UI vitest matrix only — NOT needed for a plain e2e run.
#                  Bake the system libs into the image (playwright install
#                  --with-deps chromium), never per test job. Browsers cache in
#                  PLAYWRIGHT_BROWSERS_PATH (shared, once). As an alternative to
#                  the Playwright download, a system Chromium can be pointed to
#                  via PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH.
#   sandbox_tests  Rootless Docker + bubblewrap for the sandbox-isolation tests
#                  and for building the coding-sandbox image (the agent builds
#                  that image itself; we only provide the capability). Needs
#                  container nesting (a yard with Docker + security.nesting, or
#                  INSTANCE_TYPE=vm for the full, security-gating run).
#                  Install Docker from the deb repo WITH docker-ce-rootless-extras
#                  (carries the rootlesskit AppArmor profile, required on 24.04)
#                  and the fuse-overlayfs storage driver; data-root stays local.
#                  INVARIANT: do NOT mount /var/run/docker.sock into the container
#                  and do NOT export DOCKER_HOST globally — the OpenClaw bootstrap
#                  refuses to run (exit 78) if either is present. The rootless
#                  socket is detected only at the coding-sandbox build step.
OPTIONAL_FEATURES=""

# Shared browser cache for the browser_tests feature (download once, reuse).
# Holds browser binaries only — system libs belong in the base image. On a cache
# shared between containers set PLAYWRIGHT_SKIP_BROWSER_GC=1 so one container's GC
# can't delete a browser another still needs, and key the path by Playwright
# version (each Playwright version wants its own browser build).
PLAYWRIGHT_BROWSERS_PATH=/srv/cache/playwright

# OS toolchain versions baked into the profile's base image. The JS *test* tools
# (vitest, typescript, @types/node) are deliberately NOT pinned here: pinned
# copies drift from the project, and the real tests run against the vendored
# node_modules after `pnpm install --frozen-lockfile`. Source of truth on a bump:
# the vendor package.json `packageManager` field (pnpm) and lockfile (JS); the
# vendor pyproject.toml (Python tools). Keep only the OS toolchain below.
NODE_VERSION=24.15.0
COREPACK_VERSION=0.31.0
PNPM_VERSION=11.2.2
PYTHON_VERSION=3.11

# pnpm must be installed arch-scoped, so ad hoc installs don't fetch Windows/
# macOS or musl variants of OpenClaw's optional native packages. The base image
# wraps the pnpm entrypoint with:
#   --config.supportedArchitectures.os=linux cpu=current libc=glibc
# Voice/native sandbox features additionally need libasound2-dev (+ golang/rustc/
# cargo/pkg-config); ffmpeg is NOT used — voice builds against libasound.
