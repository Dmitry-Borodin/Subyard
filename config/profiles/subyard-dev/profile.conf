# Profile: subyard-dev — L1 toolchain for developing Subyard itself.
#
# The project stays target=yard. `yard provision subyard-dev` installs only the bootstrap tools;
# go.mod remains authoritative for the exact Go toolchain selected during builds.

PROFILE_NAME=subyard-dev

# Persistent, dev-owned caches on the yard volume. The Go environment written by provision.sh
# points module/toolchain downloads and compiled objects here.
CACHES="/srv/cache/go-build /srv/cache/go-mod"
GOCACHE=/srv/cache/go-build
GOMODCACHE=/srv/cache/go-mod
